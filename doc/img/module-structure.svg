<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650" font-family="sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#E72121"/>
    </marker>
  </defs>

  <!-- mercari-bot コンテナ -->
  <rect x="20" y="30" width="860" height="330" rx="10" fill="#fffdfd" stroke="#E72121" stroke-width="2"/>
  <text x="40" y="58" font-size="15" font-weight="bold" fill="#E72121">mercari-bot（src/mercari_bot/）</text>

  <!-- Row 1 -->
  <rect x="45" y="80" width="130" height="44" rx="6" fill="#fff" stroke="#555"/>
  <text x="110" y="98" font-size="12.5" font-weight="bold" text-anchor="middle">__main__.py</text>
  <text x="110" y="115" font-size="10" fill="#666" text-anchor="middle">python -m 実行用</text>

  <rect x="225" y="80" width="160" height="44" rx="6" fill="#fff" stroke="#555"/>
  <text x="305" y="98" font-size="12.5" font-weight="bold" text-anchor="middle">cli.py</text>
  <text x="305" y="115" font-size="10" fill="#666" text-anchor="middle">docopt CLI・プロファイル巡回</text>

  <rect x="435" y="80" width="160" height="44" rx="6" fill="#fff" stroke="#555"/>
  <text x="515" y="98" font-size="12.5" font-weight="bold" text-anchor="middle">config.py</text>
  <text x="515" y="115" font-size="10" fill="#666" text-anchor="middle">設定読み込み・dataclass</text>

  <rect x="645" y="80" width="130" height="44" rx="6" fill="#fff" stroke="#999" stroke-dasharray="4 3"/>
  <text x="710" y="98" font-size="12.5" font-weight="bold" text-anchor="middle">demo.py</text>
  <text x="710" y="115" font-size="10" fill="#666" text-anchor="middle">モック実行デモ</text>

  <!-- Row 2 -->
  <rect x="45" y="180" width="130" height="44" rx="6" fill="#fff" stroke="#555"/>
  <text x="110" y="198" font-size="12.5" font-weight="bold" text-anchor="middle">logic.py</text>
  <text x="110" y="215" font-size="10" fill="#666" text-anchor="middle">純粋ロジック</text>

  <rect x="225" y="180" width="200" height="54" rx="6" fill="#fdeaea" stroke="#E72121" stroke-width="1.5"/>
  <text x="325" y="202" font-size="13" font-weight="bold" text-anchor="middle">mercari_price_down.py</text>
  <text x="325" y="221" font-size="10" fill="#666" text-anchor="middle">値下げ処理の中核</text>

  <rect x="475" y="180" width="150" height="44" rx="6" fill="#fff" stroke="#555"/>
  <text x="550" y="198" font-size="12.5" font-weight="bold" text-anchor="middle">history.py</text>
  <text x="550" y="215" font-size="10" fill="#666" text-anchor="middle">履歴記録・売却検知</text>

  <rect x="675" y="180" width="170" height="44" rx="6" fill="#fff" stroke="#555"/>
  <text x="760" y="198" font-size="12.5" font-weight="bold" text-anchor="middle">progress.py</text>
  <text x="760" y="215" font-size="10" fill="#666" text-anchor="middle">進捗表示・observer</text>

  <!-- Row 3 -->
  <rect x="225" y="290" width="160" height="44" rx="6" fill="#fff" stroke="#555"/>
  <text x="305" y="308" font-size="12.5" font-weight="bold" text-anchor="middle">exceptions.py</text>
  <text x="305" y="325" font-size="10" fill="#666" text-anchor="middle">例外階層</text>

  <rect x="435" y="290" width="190" height="44" rx="6" fill="#fff" stroke="#555"/>
  <text x="530" y="308" font-size="12.5" font-weight="bold" text-anchor="middle">notify_slack.py</text>
  <text x="530" y="325" font-size="10" fill="#666" text-anchor="middle">ダンプ付きエラー通知</text>

  <!-- mercari-bot 内の依存関係 -->
  <line x1="175" y1="102" x2="222" y2="102" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="385" y1="102" x2="432" y2="102" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="305" y1="124" x2="305" y2="177" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="225" y1="207" x2="178" y2="204" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="425" y1="205" x2="472" y2="203" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 405 180 L 405 158 L 760 158 L 760 177" fill="none" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="295" y1="234" x2="300" y2="287" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 375 234 L 375 264 L 530 264 L 530 287" fill="none" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- 依存の矢印（bot → my_lib） -->
  <line x1="450" y1="360" x2="450" y2="405" stroke="#E72121" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="465" y="388" font-size="11.5" fill="#E72121">依存（pyproject.toml で git コミットハッシュを pin）</text>

  <!-- my_lib コンテナ -->
  <rect x="20" y="410" width="860" height="220" rx="10" fill="#f7fafd" stroke="#3572b0" stroke-width="2"/>
  <text x="40" y="438" font-size="15" font-weight="bold" fill="#3572b0">my_lib（../my-py-lib）</text>

  <!-- my_lib Row 1 -->
  <rect x="45" y="455" width="150" height="48" rx="6" fill="#eef4fb" stroke="#3572b0"/>
  <text x="120" y="474" font-size="11.5" font-weight="bold" text-anchor="middle">browser_manager</text>
  <text x="120" y="492" font-size="9.5" fill="#666" text-anchor="middle">Chrome 起動・プロファイル</text>

  <rect x="215" y="455" width="150" height="48" rx="6" fill="#eef4fb" stroke="#3572b0"/>
  <text x="290" y="474" font-size="11.5" font-weight="bold" text-anchor="middle">store.mercari.login</text>
  <text x="290" y="492" font-size="9.5" fill="#666" text-anchor="middle">LINE 認証・CAPTCHA</text>

  <rect x="385" y="455" width="150" height="48" rx="6" fill="#eef4fb" stroke="#3572b0"/>
  <text x="460" y="474" font-size="11.5" font-weight="bold" text-anchor="middle">store.mercari.scrape</text>
  <text x="460" y="492" font-size="9.5" fill="#666" text-anchor="middle">アイテム列挙・リトライ</text>

  <rect x="555" y="455" width="150" height="48" rx="6" fill="#eef4fb" stroke="#3572b0"/>
  <text x="630" y="474" font-size="11.5" font-weight="bold" text-anchor="middle">store.mercari.progress</text>
  <text x="630" y="492" font-size="9.5" fill="#666" text-anchor="middle">observer Protocol</text>

  <rect x="725" y="455" width="150" height="48" rx="6" fill="#eef4fb" stroke="#3572b0"/>
  <text x="800" y="474" font-size="11.5" font-weight="bold" text-anchor="middle">selenium_util</text>
  <text x="800" y="492" font-size="9.5" fill="#666" text-anchor="middle">クリック・待機・ダンプ</text>

  <!-- my_lib Row 2 -->
  <rect x="45" y="545" width="150" height="48" rx="6" fill="#eef4fb" stroke="#3572b0"/>
  <text x="120" y="564" font-size="11.5" font-weight="bold" text-anchor="middle">notify.slack / mail</text>
  <text x="120" y="582" font-size="9.5" fill="#666" text-anchor="middle">通知基盤</text>

  <rect x="215" y="545" width="150" height="48" rx="6" fill="#eef4fb" stroke="#3572b0"/>
  <text x="290" y="564" font-size="11.5" font-weight="bold" text-anchor="middle">sqlite_util</text>
  <text x="290" y="582" font-size="9.5" fill="#666" text-anchor="middle">SQLite 接続・スキーマ</text>

  <rect x="385" y="545" width="150" height="48" rx="6" fill="#eef4fb" stroke="#3572b0"/>
  <text x="460" y="564" font-size="11.5" font-weight="bold" text-anchor="middle">cui_progress</text>
  <text x="460" y="582" font-size="9.5" fill="#666" text-anchor="middle">Rich 進捗表示</text>

  <rect x="555" y="545" width="150" height="48" rx="6" fill="#eef4fb" stroke="#3572b0"/>
  <text x="630" y="564" font-size="11.5" font-weight="bold" text-anchor="middle">config</text>
  <text x="630" y="582" font-size="9.5" fill="#666" text-anchor="middle">YAML 読込・schema 検証</text>

  <rect x="725" y="545" width="150" height="48" rx="6" fill="#eef4fb" stroke="#3572b0"/>
  <text x="800" y="564" font-size="11.5" font-weight="bold" text-anchor="middle">time</text>
  <text x="800" y="582" font-size="9.5" fill="#666" text-anchor="middle">TZ 付き現在時刻</text>
</svg>
