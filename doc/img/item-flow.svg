<svg xmlns="http://www.w3.org/2000/svg" width="860" height="1130" viewBox="0 0 860 1130" font-family="sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-gray" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#888"/>
    </marker>
    <marker id="arrow-red" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- 開始 -->
  <rect x="120" y="20" width="340" height="44" rx="22" fill="#f7fafd" stroke="#3572b0" stroke-width="1.5"/>
  <text x="290" y="39" font-size="12" font-weight="bold" text-anchor="middle">商品詳細ページに到達（my_lib 側で遷移済み）</text>
  <text x="290" y="55" font-size="10" fill="#666" text-anchor="middle">公開停止中のアイテムは my_lib 側で除外される</text>
  <line x1="290" y1="64" x2="290" y2="86" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- close_popup -->
  <rect x="120" y="89" width="340" height="40" rx="6" fill="#fff" stroke="#555"/>
  <text x="290" y="113" font-size="12" text-anchor="middle">close_popup() でダイアログ・ポップアップを閉じる</text>
  <line x1="290" y1="129" x2="290" y2="151" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- 更新時間 -->
  <rect x="120" y="154" width="340" height="44" rx="6" fill="#fff" stroke="#555"/>
  <text x="290" y="173" font-size="12" text-anchor="middle">更新時間テキストを取得し parse_modified_hour()</text>
  <text x="290" y="190" font-size="10" fill="#666" text-anchor="middle">秒 / 分 / 時間 / 日 / 週間 / か月 / 半年以上前 に対応</text>
  <line x1="460" y1="176" x2="560" y2="176" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arrow-red)"/>
  <rect x="563" y="154" width="270" height="44" rx="6" fill="#fdecea" stroke="#c0392b"/>
  <text x="698" y="173" font-size="11" font-weight="bold" fill="#c0392b" text-anchor="middle">ModifiedTimeParseError</text>
  <text x="698" y="190" font-size="9.5" fill="#c0392b" text-anchor="middle">パース不能な表記（未知の形式）</text>
  <line x1="290" y1="198" x2="290" y2="220" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- interval 判定 -->
  <polygon points="130,258 290,223 450,258 290,293" fill="#fff8e1" stroke="#b7950b"/>
  <text x="290" y="254" font-size="12" text-anchor="middle">更新から interval.hour 以上</text>
  <text x="290" y="270" font-size="12" text-anchor="middle">経過している？</text>
  <line x1="450" y1="258" x2="560" y2="258" stroke="#888" stroke-width="1.3" marker-end="url(#arrow-gray)"/>
  <text x="500" y="250" font-size="10.5" fill="#888">No</text>
  <rect x="563" y="238" width="270" height="40" rx="6" fill="#f0f0f0" stroke="#888"/>
  <text x="698" y="262" font-size="11.5" font-weight="bold" fill="#555" text-anchor="middle">SKIP_RECENT（更新間隔未経過）</text>
  <line x1="290" y1="293" x2="290" y2="315" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="300" y="311" font-size="10.5" fill="#555">Yes</text>

  <!-- 編集ページへ -->
  <rect x="120" y="318" width="340" height="44" rx="6" fill="#fff" stroke="#555"/>
  <text x="290" y="337" font-size="12" text-anchor="middle">編集ページへ遷移</text>
  <text x="290" y="354" font-size="10" fill="#666" text-anchor="middle">checkout-link クリック →「商品の情報を編集」タイトル待機</text>
  <line x1="290" y1="362" x2="290" y2="384" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- タイムセール判定 -->
  <polygon points="130,422 290,387 450,422 290,457" fill="#fff8e1" stroke="#b7950b"/>
  <text x="290" y="427" font-size="12" text-anchor="middle">タイムセール中？</text>
  <line x1="450" y1="422" x2="560" y2="422" stroke="#888" stroke-width="1.3" marker-end="url(#arrow-gray)"/>
  <text x="500" y="414" font-size="10.5" fill="#888">Yes</text>
  <rect x="563" y="402" width="270" height="40" rx="6" fill="#f0f0f0" stroke="#888"/>
  <text x="698" y="426" font-size="11.5" font-weight="bold" fill="#555" text-anchor="middle">SKIP_TIME_SALE</text>
  <line x1="290" y1="457" x2="290" y2="479" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="300" y="475" font-size="10.5" fill="#555">No</text>

  <!-- オークション判定 -->
  <polygon points="130,517 290,482 450,517 290,552" fill="#fff8e1" stroke="#b7950b"/>
  <text x="290" y="522" font-size="12" text-anchor="middle">オークション形式？</text>
  <line x1="450" y1="517" x2="560" y2="517" stroke="#888" stroke-width="1.3" marker-end="url(#arrow-gray)"/>
  <text x="500" y="509" font-size="10.5" fill="#888">Yes</text>
  <rect x="563" y="497" width="270" height="40" rx="6" fill="#f0f0f0" stroke="#888"/>
  <text x="698" y="521" font-size="11.5" font-weight="bold" fill="#555" text-anchor="middle">SKIP_AUCTION</text>
  <line x1="290" y1="552" x2="290" y2="574" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="300" y="570" font-size="10.5" fill="#555">No</text>

  <!-- 送料と価格 -->
  <rect x="120" y="577" width="340" height="44" rx="6" fill="#fff" stroke="#555"/>
  <text x="290" y="596" font-size="12" text-anchor="middle">送料を取得（梱包・発送たのメル便の場合）</text>
  <text x="290" y="613" font-size="10" fill="#666" text-anchor="middle">price = 一覧の表示価格 − 送料</text>
  <line x1="290" y1="621" x2="290" y2="643" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- 価格一致判定 -->
  <polygon points="130,681 290,646 450,681 290,716" fill="#fff8e1" stroke="#b7950b"/>
  <text x="290" y="677" font-size="12" text-anchor="middle">フォームの現在価格 ==</text>
  <text x="290" y="693" font-size="12" text-anchor="middle">price ？</text>
  <line x1="450" y1="681" x2="560" y2="681" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arrow-red)"/>
  <text x="500" y="673" font-size="10.5" fill="#c0392b">不一致</text>
  <rect x="563" y="661" width="270" height="44" rx="6" fill="#fdecea" stroke="#c0392b"/>
  <text x="698" y="680" font-size="11" font-weight="bold" fill="#c0392b" text-anchor="middle">PriceChangedError</text>
  <text x="698" y="697" font-size="9.5" fill="#c0392b" text-anchor="middle">ページ遷移中に価格が変更された</text>
  <line x1="290" y1="716" x2="290" y2="738" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="300" y="734" font-size="10.5" fill="#555">一致</text>

  <!-- 値下げ幅判定 -->
  <polygon points="130,776 290,741 450,776 290,811" fill="#fff8e1" stroke="#b7950b"/>
  <text x="290" y="772" font-size="12" text-anchor="middle">get_discount_step() が</text>
  <text x="290" y="788" font-size="12" text-anchor="middle">値下げ幅を返した？</text>
  <line x1="450" y1="776" x2="560" y2="776" stroke="#888" stroke-width="1.3" marker-end="url(#arrow-gray)"/>
  <text x="490" y="768" font-size="10.5" fill="#888">None</text>
  <rect x="563" y="756" width="270" height="44" rx="6" fill="#f0f0f0" stroke="#888"/>
  <text x="698" y="775" font-size="11.5" font-weight="bold" fill="#555" text-anchor="middle">SKIP_NO_DISCOUNT</text>
  <text x="698" y="792" font-size="9.5" fill="#555" text-anchor="middle">下限（threshold）割れ / お気に入り条件未達</text>
  <line x1="290" y1="811" x2="290" y2="833" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="300" y="829" font-size="10.5" fill="#555">step</text>

  <!-- 価格入力・送信 -->
  <rect x="120" y="836" width="340" height="56" rx="6" fill="#fdeaea" stroke="#E72121" stroke-width="1.5"/>
  <text x="290" y="856" font-size="12" font-weight="bold" text-anchor="middle">新価格を入力し「変更する」を送信</text>
  <text x="290" y="872" font-size="10" fill="#666" text-anchor="middle">new_price = round_price(price − step)（10 円単位に切り捨て）</text>
  <text x="290" y="886" font-size="10" fill="#666" text-anchor="middle">-D 時は step を適用せず同額を送信</text>

  <!-- 送信確定ライン -->
  <line x1="40" y1="910" x2="833" y2="910" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="436" y="928" font-size="11.5" font-weight="bold" fill="#c0392b" text-anchor="middle">―― 送信確定（これ以降の TimeoutException は my_lib のリトライに乗せない）――</text>
  <line x1="290" y1="892" x2="290" y2="938" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- 検証準備 -->
  <rect x="120" y="941" width="340" height="56" rx="6" fill="#fff" stroke="#555"/>
  <text x="290" y="960" font-size="12" text-anchor="middle">確認ポップアップ処理 → 商品ページで h1・価格を待機</text>
  <text x="290" y="976" font-size="10" fill="#666" text-anchor="middle">ページ遷移しない場合は編集ページをダンプし詳細ページへ直接遷移</text>
  <text x="290" y="990" font-size="10" fill="#666" text-anchor="middle">リロードして表示価格を再取得</text>
  <line x1="460" y1="969" x2="560" y2="969" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arrow-red)"/>
  <text x="478" y="961" font-size="10" fill="#c0392b">Timeout</text>
  <rect x="563" y="947" width="270" height="44" rx="6" fill="#fdecea" stroke="#c0392b"/>
  <text x="698" y="966" font-size="10.5" font-weight="bold" fill="#c0392b" text-anchor="middle">PriceVerificationTimeoutError</text>
  <text x="698" y="983" font-size="9.5" fill="#c0392b" text-anchor="middle">通知 + プロファイル失敗（FAILED を記録）</text>
  <line x1="290" y1="997" x2="290" y2="1019" stroke="#555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- 検証判定 -->
  <polygon points="130,1057 290,1022 450,1057 290,1092" fill="#fff8e1" stroke="#b7950b"/>
  <text x="290" y="1053" font-size="12" text-anchor="middle">表示価格 ==</text>
  <text x="290" y="1069" font-size="12" text-anchor="middle">new_price + 送料 ？</text>
  <line x1="450" y1="1057" x2="560" y2="1057" stroke="#c0392b" stroke-width="1.3" marker-end="url(#arrow-red)"/>
  <text x="500" y="1049" font-size="10.5" fill="#c0392b">不一致</text>
  <rect x="563" y="1037" width="270" height="44" rx="6" fill="#fdecea" stroke="#c0392b"/>
  <text x="698" y="1056" font-size="11" font-weight="bold" fill="#c0392b" text-anchor="middle">PriceVerificationError</text>
  <text x="698" y="1073" font-size="9.5" fill="#c0392b" text-anchor="middle">通知 + プロファイル失敗（FAILED を記録）</text>

  <line x1="230" y1="1079" x2="200 " y2="1101" stroke="#27ae60" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="230" y="1102" font-size="10.5" fill="#27ae60">一致</text>
  <rect x="40" y="1104" width="320" height="22" rx="11" fill="#e9f7ef" stroke="#27ae60" stroke-width="1.5"/>
  <text x="200" y="1119" font-size="11.5" font-weight="bold" fill="#1e8449" text-anchor="middle">PRICE_DOWN（値下げ完了・履歴に記録）</text>
</svg>
